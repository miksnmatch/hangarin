{% extends 'base.html' %}
{% load static %}
{% block title %}Delete Category | Task Manager{% endblock %}
{% block nav_categories %}active{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <div class="mb-3">
          <i class="fas fa-triangle-exclamation text-danger" style="font-size:3rem;"></i>
        </div>
        <h5 class="fw-bold">Delete Category</h5>
        <p class="text-muted mb-4">Are you sure you want to delete <strong>"{{ object.name }}"</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-3">
            <button type="submit" class="btn btn-danger" style="border-radius:0.5rem;">
              <i class="fas fa-trash me-1"></i> Yes, Delete
            </button>
            <a href="{% url 'category-list' %}" class="btn btn-outline-secondary" style="border-radius:0.5rem;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
